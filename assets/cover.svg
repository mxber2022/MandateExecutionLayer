<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid overlay -->
  <g opacity="0.04">
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="white" stroke-width="0.5"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#grid)"/>
  </g>

  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- Title Section -->
  <text x="600" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="-1">Mandate Execution Layer</text>
  <text x="600" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#a78bfa" font-weight="500" letter-spacing="1">Bounded Authority for AI Agents &#x2022; Onchain Compliance Proofs</text>

  <!-- 5-Layer Architecture -->
  <text x="80" y="185" font-family="system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.4)" font-weight="600" letter-spacing="2">ARCHITECTURE</text>

  <!-- Layer 1: Personhood -->
  <rect x="80" y="200" width="200" height="70" rx="12" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
  <text x="110" y="230" font-family="system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" font-weight="600" letter-spacing="1">LAYER 1</text>
  <text x="110" y="254" font-family="system-ui, sans-serif" font-size="17" fill="#a78bfa" font-weight="700">Personhood</text>

  <!-- Arrow -->
  <text x="295" y="242" font-family="system-ui, sans-serif" font-size="20" fill="rgba(255,255,255,0.2)">&#x2192;</text>

  <!-- Layer 2: Mandate -->
  <rect x="320" y="200" width="200" height="70" rx="12" fill="rgba(59,130,246,0.12)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
  <text x="350" y="230" font-family="system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" font-weight="600" letter-spacing="1">LAYER 2</text>
  <text x="350" y="254" font-family="system-ui, sans-serif" font-size="17" fill="#60a5fa" font-weight="700">Mandate</text>

  <!-- Arrow -->
  <text x="535" y="242" font-family="system-ui, sans-serif" font-size="20" fill="rgba(255,255,255,0.2)">&#x2192;</text>

  <!-- Layer 3: Identity -->
  <rect x="560" y="200" width="200" height="70" rx="12" fill="rgba(16,185,129,0.12)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="590" y="230" font-family="system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" font-weight="600" letter-spacing="1">LAYER 3</text>
  <text x="590" y="254" font-family="system-ui, sans-serif" font-size="17" fill="#34d399" font-weight="700">Identity</text>

  <!-- Arrow -->
  <text x="775" y="242" font-family="system-ui, sans-serif" font-size="20" fill="rgba(255,255,255,0.2)">&#x2192;</text>

  <!-- Layer 4: Reasoning -->
  <rect x="800" y="200" width="200" height="70" rx="12" fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="830" y="230" font-family="system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" font-weight="600" letter-spacing="1">LAYER 4</text>
  <text x="830" y="254" font-family="system-ui, sans-serif" font-size="17" fill="#fbbf24" font-weight="700">Reasoning</text>

  <!-- Arrow -->
  <text x="1015" y="242" font-family="system-ui, sans-serif" font-size="20" fill="rgba(255,255,255,0.2)">&#x2192;</text>

  <!-- Layer 5: Receipt -->
  <rect x="1040" y="200" width="120" height="70" rx="12" fill="rgba(239,68,68,0.12)" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>
  <text x="1060" y="230" font-family="system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" font-weight="600" letter-spacing="1">LAYER 5</text>
  <text x="1060" y="254" font-family="system-ui, sans-serif" font-size="17" fill="#f87171" font-weight="700">Receipt</text>

  <!-- Sublabels -->
  <text x="130" y="288" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.3)">Self Protocol</text>
  <text x="370" y="288" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.3)">MandateRegistry.sol</text>
  <text x="610" y="288" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.3)">Self Agent ID #34</text>
  <text x="850" y="288" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.3)">Venice AI (private)</text>
  <text x="1100" y="288" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.3)">ActionReceipt.sol</text>

  <!-- Trust Chain -->
  <text x="80" y="330" font-family="system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.4)" font-weight="600" letter-spacing="2">TRUST CHAIN</text>

  <rect x="80" y="345" width="1080" height="50" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="600" y="377" text-anchor="middle" font-family="monospace" font-size="16" fill="rgba(255,255,255,0.6)">receipt &#x2192; mandate &#x2192; Self Agent ID NFT &#x2192; verified human</text>

  <!-- Demo Results -->
  <text x="80" y="430" font-family="system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.4)" font-weight="600" letter-spacing="2">LIVE DEMO RESULTS</text>

  <!-- Executed actions -->
  <rect x="80" y="448" width="320" height="44" rx="8" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
  <circle cx="105" cy="470" r="6" fill="#10b981"/>
  <text x="120" y="475" font-family="system-ui, sans-serif" font-size="15" fill="rgba(255,255,255,0.8)" font-weight="600">send_message</text>
  <text x="310" y="475" font-family="system-ui, sans-serif" font-size="13" fill="#10b981" font-weight="700">EXECUTED</text>

  <rect x="80" y="500" width="320" height="44" rx="8" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
  <circle cx="105" cy="522" r="6" fill="#10b981"/>
  <text x="120" y="527" font-family="system-ui, sans-serif" font-size="15" fill="rgba(255,255,255,0.8)" font-weight="600">query_api</text>
  <text x="310" y="527" font-family="system-ui, sans-serif" font-size="13" fill="#10b981" font-weight="700">EXECUTED</text>

  <!-- Blocked actions -->
  <rect x="440" y="448" width="320" height="44" rx="8" fill="rgba(239,68,68,0.1)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <circle cx="465" cy="470" r="6" fill="#ef4444"/>
  <text x="480" y="475" font-family="system-ui, sans-serif" font-size="15" fill="rgba(255,255,255,0.8)" font-weight="600">transfer_funds</text>
  <text x="680" y="475" font-family="system-ui, sans-serif" font-size="13" fill="#ef4444" font-weight="700">BLOCKED</text>

  <rect x="440" y="500" width="320" height="44" rx="8" fill="rgba(239,68,68,0.1)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <circle cx="465" cy="522" r="6" fill="#ef4444"/>
  <text x="480" y="527" font-family="system-ui, sans-serif" font-size="15" fill="rgba(255,255,255,0.8)" font-weight="600">admin_override</text>
  <text x="680" y="527" font-family="system-ui, sans-serif" font-size="13" fill="#ef4444" font-weight="700">BLOCKED</text>

  <!-- Post-revocation -->
  <rect x="800" y="448" width="360" height="44" rx="8" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <circle cx="825" cy="470" r="6" fill="#f59e0b"/>
  <text x="840" y="475" font-family="system-ui, sans-serif" font-size="15" fill="rgba(255,255,255,0.8)" font-weight="600">send_message (revoked)</text>
  <text x="1080" y="475" font-family="system-ui, sans-serif" font-size="13" fill="#f59e0b" font-weight="700">BLOCKED</text>

  <!-- Stats -->
  <rect x="800" y="500" width="120" height="44" rx="8" fill="rgba(139,92,246,0.1)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
  <text x="860" y="520" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" fill="#a78bfa" font-weight="800">7</text>
  <text x="860" y="537" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">onchain txns</text>

  <rect x="930" y="500" width="120" height="44" rx="8" fill="rgba(139,92,246,0.1)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
  <text x="990" y="520" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" fill="#a78bfa" font-weight="800">5</text>
  <text x="990" y="537" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">receipts</text>

  <rect x="1060" y="500" width="100" height="44" rx="8" fill="rgba(139,92,246,0.1)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
  <text x="1110" y="520" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" fill="#a78bfa" font-weight="800">3</text>
  <text x="1110" y="537" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">contracts</text>

  <!-- Footer -->
  <text x="80" y="600" font-family="system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.25)">Celo Sepolia &#x2022; Self Protocol &#x2022; Venice AI &#x2022; Foundry + TypeScript</text>
  <text x="1120" y="600" text-anchor="end" font-family="system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.25)">Synthesis Hackathon 2026</text>
</svg>
