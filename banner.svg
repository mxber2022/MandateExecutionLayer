<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a3a2a" stroke-width="0.5" opacity="0.6"/>
    </pattern>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Gradient backgrounds -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f0d"/>
      <stop offset="50%" style="stop-color:#0d1a14"/>
      <stop offset="100%" style="stop-color:#0a0f0d"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="100%" style="stop-color:#00ccff"/>
    </linearGradient>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#00ff88;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#00ccff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00ccff;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="box-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0.02"/>
    </linearGradient>
    <linearGradient id="arrow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="50%" style="stop-color:#00ccff"/>
      <stop offset="100%" style="stop-color:#ff6600"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Decorative circuit lines -->
  <g opacity="0.3">
    <line x1="0" y1="120" x2="200" y2="120" stroke="#00ff88" stroke-width="1"/>
    <line x1="200" y1="120" x2="220" y2="100" stroke="#00ff88" stroke-width="1"/>
    <line x1="220" y1="100" x2="350" y2="100" stroke="#00ff88" stroke-width="1"/>
    <circle cx="350" cy="100" r="3" fill="#00ff88"/>

    <line x1="1200" y1="200" x2="1000" y2="200" stroke="#00ccff" stroke-width="1"/>
    <line x1="1000" y1="200" x2="980" y2="220" stroke="#00ccff" stroke-width="1"/>
    <line x1="980" y1="220" x2="900" y2="220" stroke="#00ccff" stroke-width="1"/>
    <circle cx="900" cy="220" r="3" fill="#00ccff"/>

    <line x1="0" y1="500" x2="150" y2="500" stroke="#ff6600" stroke-width="1"/>
    <line x1="150" y1="500" x2="170" y2="480" stroke="#ff6600" stroke-width="1"/>
    <line x1="170" y1="480" x2="280" y2="480" stroke="#ff6600" stroke-width="1"/>
    <circle cx="280" cy="480" r="3" fill="#ff6600"/>

    <line x1="1200" y1="450" x2="1050" y2="450" stroke="#00ff88" stroke-width="1"/>
    <line x1="1050" y1="450" x2="1030" y2="430" stroke="#00ff88" stroke-width="1"/>
    <line x1="1030" y1="430" x2="950" y2="430" stroke="#00ff88" stroke-width="1"/>
    <circle cx="950" cy="430" r="3" fill="#00ff88"/>
  </g>

  <!-- Corner accents -->
  <g opacity="0.5">
    <path d="M 30 30 L 30 60 M 30 30 L 60 30" stroke="#00ff88" stroke-width="2" fill="none"/>
    <path d="M 1170 30 L 1170 60 M 1170 30 L 1140 30" stroke="#00ff88" stroke-width="2" fill="none"/>
    <path d="M 30 600 L 30 570 M 30 600 L 60 600" stroke="#00ccff" stroke-width="2" fill="none"/>
    <path d="M 1170 600 L 1170 570 M 1170 600 L 1140 600" stroke="#00ccff" stroke-width="2" fill="none"/>
  </g>

  <!-- Title -->
  <text x="600" y="155" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="52" font-weight="bold" fill="url(#title-grad)" filter="url(#glow)">
    MANDATE EXECUTION LAYER
  </text>

  <!-- Subtitle -->
  <text x="600" y="200" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="18" fill="#7fccaa" opacity="0.9" letter-spacing="4">
    BOUNDED AUTHORITY FOR AI AGENTS
  </text>

  <!-- Horizontal separator -->
  <rect x="200" y="225" width="800" height="1" fill="url(#line-grad)" filter="url(#glow)"/>

  <!-- 5-Layer Architecture -->
  <!-- Layer boxes -->
  <g transform="translate(95, 270)">
    <!-- Personhood -->
    <rect x="0" y="0" width="180" height="70" rx="6" fill="url(#box-grad)" stroke="#00ff88" stroke-width="1.5" opacity="0.9"/>
    <text x="90" y="30" text-anchor="middle" font-family="'SF Mono', monospace" font-size="11" fill="#00ff88" font-weight="bold" letter-spacing="1">PERSONHOOD</text>
    <text x="90" y="50" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#5a8a72">Self Protocol ZK</text>

    <!-- Arrow 1 -->
    <text x="205" y="40" font-family="monospace" font-size="20" fill="#00ff88" filter="url(#glow)">→</text>

    <!-- Mandate -->
    <rect x="230" y="0" width="180" height="70" rx="6" fill="url(#box-grad)" stroke="#00e07a" stroke-width="1.5" opacity="0.9"/>
    <text x="320" y="30" text-anchor="middle" font-family="'SF Mono', monospace" font-size="11" fill="#00e07a" font-weight="bold" letter-spacing="1">MANDATE</text>
    <text x="320" y="50" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#5a8a72">MandateRegistry.sol</text>

    <!-- Arrow 2 -->
    <text x="435" y="40" font-family="monospace" font-size="20" fill="#00ccbb" filter="url(#glow)">→</text>

    <!-- Identity -->
    <rect x="460" y="0" width="180" height="70" rx="6" fill="url(#box-grad)" stroke="#00ccff" stroke-width="1.5" opacity="0.9"/>
    <text x="550" y="30" text-anchor="middle" font-family="'SF Mono', monospace" font-size="11" fill="#00ccff" font-weight="bold" letter-spacing="1">IDENTITY</text>
    <text x="550" y="50" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#5a7a8a">ERC-8004 Agent</text>

    <!-- Arrow 3 -->
    <text x="665" y="40" font-family="monospace" font-size="20" fill="#00aaee" filter="url(#glow)">→</text>

    <!-- Reasoning -->
    <rect x="690" y="0" width="180" height="70" rx="6" fill="url(#box-grad)" stroke="#0088dd" stroke-width="1.5" opacity="0.9"/>
    <text x="780" y="30" text-anchor="middle" font-family="'SF Mono', monospace" font-size="11" fill="#0088dd" font-weight="bold" letter-spacing="1">REASONING</text>
    <text x="780" y="50" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#5a7a8a">Venice AI Private</text>

    <!-- Arrow 4 -->
    <text x="895" y="40" font-family="monospace" font-size="20" fill="#ff8833" filter="url(#glow)">→</text>

    <!-- Receipt -->
    <rect x="920" y="0" width="180" height="70" rx="6" fill="url(#box-grad)" stroke="#ff6600" stroke-width="1.5" opacity="0.9"/>
    <text x="1010" y="30" text-anchor="middle" font-family="'SF Mono', monospace" font-size="11" fill="#ff6600" font-weight="bold" letter-spacing="1">RECEIPT</text>
    <text x="1010" y="50" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#8a6a5a">ActionReceipt.sol</text>
  </g>

  <!-- Trust Chain -->
  <text x="600" y="400" text-anchor="middle" font-family="'SF Mono', monospace" font-size="14" fill="#5a8a72" letter-spacing="2">
    TRUST CHAIN
  </text>
  <text x="600" y="430" text-anchor="middle" font-family="'SF Mono', monospace" font-size="16" fill="#aaddbb" filter="url(#glow)" letter-spacing="1">
    receipt → mandate → selfProofHash → verified human
  </text>

  <!-- Separator -->
  <rect x="300" y="455" width="600" height="1" fill="url(#line-grad)" opacity="0.4"/>

  <!-- Demo stats -->
  <g transform="translate(0, 480)">
    <text x="250" y="0" text-anchor="middle" font-family="'SF Mono', monospace" font-size="36" fill="#00ff88" font-weight="bold" filter="url(#glow)">7</text>
    <text x="250" y="22" text-anchor="middle" font-family="'SF Mono', monospace" font-size="11" fill="#5a8a72">ONCHAIN TXS</text>

    <text x="480" y="0" text-anchor="middle" font-family="'SF Mono', monospace" font-size="36" fill="#00ccff" font-weight="bold" filter="url(#glow)">5</text>
    <text x="480" y="22" text-anchor="middle" font-family="'SF Mono', monospace" font-size="11" fill="#5a7a8a">ACTION RECEIPTS</text>

    <text x="710" y="0" text-anchor="middle" font-family="'SF Mono', monospace" font-size="36" fill="#ff6600" font-weight="bold" filter="url(#glow)">100%</text>
    <text x="710" y="22" text-anchor="middle" font-family="'SF Mono', monospace" font-size="11" fill="#8a6a5a">ONCHAIN VERIFIABLE</text>

    <text x="940" y="0" text-anchor="middle" font-family="'SF Mono', monospace" font-size="36" fill="#00ff88" font-weight="bold" filter="url(#glow)">0</text>
    <text x="940" y="22" text-anchor="middle" font-family="'SF Mono', monospace" font-size="11" fill="#5a8a72">TRUST REQUIRED</text>
  </g>

  <!-- Bottom tech badges -->
  <g transform="translate(270, 555)">
    <rect x="0" y="0" width="90" height="26" rx="4" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.7"/>
    <text x="45" y="17" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#00ff88">Solidity</text>

    <rect x="105" y="0" width="100" height="26" rx="4" fill="none" stroke="#00ccff" stroke-width="1" opacity="0.7"/>
    <text x="155" y="17" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#00ccff">TypeScript</text>

    <rect x="220" y="0" width="105" height="26" rx="4" fill="none" stroke="#0088dd" stroke-width="1" opacity="0.7"/>
    <text x="272" y="17" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#0088dd">Base Sepolia</text>

    <rect x="340" y="0" width="85" height="26" rx="4" fill="none" stroke="#ff6600" stroke-width="1" opacity="0.7"/>
    <text x="382" y="17" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#ff6600">Venice AI</text>

    <rect x="440" y="0" width="75" height="26" rx="4" fill="none" stroke="#00e07a" stroke-width="1" opacity="0.7"/>
    <text x="477" y="17" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#00e07a">Viem</text>

    <rect x="530" y="0" width="100" height="26" rx="4" fill="none" stroke="#aaddbb" stroke-width="1" opacity="0.7"/>
    <text x="580" y="17" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#aaddbb">ERC-8004</text>
  </g>

  <!-- Scan line effect -->
  <rect x="0" y="0" width="1200" height="2" fill="#00ff88" opacity="0.03">
    <animate attributeName="y" from="0" to="630" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>